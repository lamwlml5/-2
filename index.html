<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المستشار أحمد والي - نظام الإدارة القانونية الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* التنسيقات كما هي بدون تغيير لضمان مظهر التطبيق */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .input-box { background-color: #1e293b; border: 1px solid #334155; transition: all 0.2s ease; }
        .input-box:focus-within { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1); }
        .tab-button-active { background-color: #f59e0b; color: white; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); border-color: #f59e0b !important; }
        .nav-active { color: #f59e0b; }
        .animate-ring { animation: ring 2s infinite ease-in-out; }
        @keyframes ring { 0% { transform: rotate(0); } 10% { transform: rotate(15deg); } 20% { transform: rotate(-15deg); } 30% { transform: rotate(10deg); } 40% { transform: rotate(-10deg); } 50% { transform: rotate(0); } 100% { transform: rotate(0); } }
        input, select, textarea { appearance: none; color-scheme: dark; }
        .case-card { background-color: #1e293b; border-radius: 2rem; padding: 1.5rem; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; transition: all 0.2s ease; }
        .case-card:active { transform: scale(0.98); }
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-page { padding: 1.5cm; page-break-after: always; direction: rtl; font-family: 'Cairo', sans-serif; color: black !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="pb-28">

    <!-- نظام التنبيه الفوري -->
    <div id="alarm-banner" class="fixed top-4 left-4 right-4 z-[300] bg-gradient-to-r from-red-600 to-amber-600 text-white p-5 rounded-3xl shadow-2xl hidden flex items-center gap-4 border border-white/20 animate-bounce no-print">
        <div class="bg-white/20 p-3 rounded-2xl animate-ring">
            <i data-lucide="bell-ring" class="w-7 h-7"></i>
        </div>
        <div class="flex-1">
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">تذكير قانوني هام</p>
            <p id="alarm-text" class="text-sm font-black leading-tight"></p>
        </div>
        <button onclick="dismissAlarm()" class="bg-black/20 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-[#020617]/80 backdrop-blur-lg z-[50] border-b border-slate-800 no-print">
        <div class="flex items-center gap-3">
            <div class="bg-amber-600 p-2.5 rounded-2xl shadow-lg shadow-amber-900/40">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight">المستشار أحمد والي</h1>
                <p class="text-[9px] text-amber-500 font-bold uppercase tracking-wider">نظام الإدارة القانونية الذكي</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="exportDatabase()" title="تصدير نسخة احتياطية" class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl active:scale-90 transition-transform">
                <i data-lucide="download" class="w-5 h-5 text-emerald-500"></i>
            </button>
            <label class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl active:scale-90 transition-transform cursor-pointer">
                <i data-lucide="upload" class="w-5 h-5 text-blue-500"></i>
                <input type="file" class="hidden" accept=".json" onchange="importDatabase(event)">
            </label>
            <button onclick="handleHeaderButtonClick()" class="bg-[#1e293b] p-3 rounded-2xl border border-slate-700 shadow-xl active:scale-90 transition-transform">
                <i data-lucide="plus" id="header-icon" class="w-6 h-6 text-amber-500 transition-all"></i>
            </button>
        </div>
    </header>

    <main class="px-5 mt-6 no-print">
        <div class="flex gap-2 mb-6 bg-slate-900/50 p-1 rounded-2xl border border-slate-800">
            <button onclick="switchCategory('cases')" id="cat-cases" class="flex-1 py-3 rounded-xl text-xs font-black transition-all bg-amber-600 text-white shadow-lg">القضايا</button>
            <button onclick="switchCategory('reports')" id="cat-reports" class="flex-1 py-3 rounded-xl text-xs font-black transition-all text-slate-500">المحاضر</button>
        </div>

        <!-- Search Area -->
        <div id="search-area" class="mb-6">
            <div class="relative">
                <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                <input type="text" id="searchInput" oninput="renderDisplay()" placeholder="ابحث في السجلات..." class="w-full bg-[#1e293b] border border-slate-800 rounded-2xl py-4 pr-12 pl-4 outline-none text-sm font-bold shadow-inner text-center">
            </div>
        </div>

        <div id="list-section">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 id="current-view-title" class="text-xs font-black text-slate-500 uppercase tracking-widest">السجلات الحالية</h2>
                <span id="items-count" class="bg-slate-800 text-amber-500 px-3 py-1 rounded-full text-[10px] font-bold">0 سجل</span>
            </div>
            <div id="cards-container" class="space-y-4"></div>
        </div>

        <!-- Form Section -->
        <div id="add-section" class="hidden pb-10 space-y-6">
            <div id="case-fields" class="space-y-4">
                <h2 class="text-amber-500 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="gavel" class="w-4 h-4"></i> بيانات الدعوى</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم القضية</label><input type="text" id="caseNumber" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم الحصر</label><input type="text" id="hasrNumber" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                </div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">المحكمة</label><input type="text" id="court" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">الدائرة</label><input type="text" id="circuit" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
            </div>

            <div id="report-fields" class="hidden space-y-4">
                <h2 class="text-blue-500 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="file-text" class="w-4 h-4"></i> بيانات المحضر</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم العريضة</label><input type="text" id="reportAridatNum" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">تاريخها</label><input type="date" id="reportAridatDate" class="w-full bg-transparent outline-none text-xs font-bold text-center"></div>
                </div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">نوع المحضر</label><input type="text" id="reportTypeInput" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
            </div>

            <div class="space-y-4">
                <h2 class="text-slate-400 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="users" class="w-4 h-4"></i> بيانات الأطراف</h2>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">اسم الموكل</label><input type="text" id="commonClientName" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div id="role-container" class="grid grid-cols-2 gap-2 p-1.5 bg-[#1e293b] rounded-2xl border border-slate-800"></div>
                <input type="hidden" id="commonClientRole" value="">
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">اسم الخصم</label><input type="text" id="commonOpponentName" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">التهمة / الموضوع</label><input type="text" id="commonCharge" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">التاريخ القادم</label><input type="date" id="commonDate" class="w-full bg-transparent outline-none text-xs font-bold text-center text-amber-500"></div>
            </div>

            <!-- الأزرار ونظام التنبيه -->
            <div class="bg-blue-600/5 border border-blue-500/20 rounded-[2rem] p-5 space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div id="alarm-indicator" class="w-2 h-2 rounded-full bg-slate-600"></div>
                        <span class="text-[11px] font-black text-blue-400">منبه التقويم</span>
                    </div>
                    <button type="button" onclick="toggleAlarm()" id="alarm-btn" class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700 transition-all flex items-center gap-2">
                        <i data-lucide="bell-off" id="alarm-icon" class="w-4 h-4 text-slate-500"></i>
                        <span id="alarm-text-btn" class="text-[10px] font-bold text-slate-500">معطل</span>
                    </button>
                </div>
                <div id="alarm-inputs" class="grid grid-cols-2 gap-3 opacity-30 pointer-events-none transition-all scale-95 origin-top">
                    <div class="input-box rounded-xl p-3"><label class="block text-[8px] text-slate-500 mb-1">اليوم</label><input type="date" id="alertDay" class="w-full bg-transparent outline-none text-[10px] text-center"></div>
                    <div class="input-box rounded-xl p-3"><label class="block text-[8px] text-slate-500 mb-1">الساعة</label><input type="time" id="alertTime" class="w-full bg-transparent outline-none text-[10px] text-center"></div>
                </div>
                <input type="hidden" id="isAlarmActive" value="false">
            </div>

            <!-- تم إصلاح الاستدعاء هنا -->
            <button onclick="saveItem()" class="w-full bg-gradient-to-r from-amber-600 to-amber-700 text-white font-black py-5 rounded-[2rem] shadow-2xl flex items-center justify-center gap-3 text-lg active:scale-95 transition-all">
                <i data-lucide="save"></i> حفظ البيانات بالكامل
            </button>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 z-[100] bg-[#1e293b]/80 backdrop-blur-xl border border-slate-700/50 h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-4 no-print">
        <button onclick="setFilter('حالية')" id="nav-حالية" class="flex flex-col items-center gap-1 nav-active"><i data-lucide="briefcase" class="w-6 h-6"></i><span class="text-[9px] font-bold">الحالية</span></button>
        <button onclick="setFilter('مداولة')" id="nav-مداولة" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="refresh-cw" class="w-6 h-6"></i><span class="text-[9px] font-bold">مداولة</span></button>
        <button onclick="setFilter('منتهية')" id="nav-منتهية" class="flex flex-col items-center gap-1 text-slate-500"><i data-lucide="check-circle-2" class="w-6 h-6"></i><span class="text-[9px] font-bold">المنتهية</span></button>
    </nav>

    <div id="print-container" class="print-only"></div>

    <script>
        // دمج المنطق بالكامل وإصلاح تكرار saveItem
        let db = JSON.parse(localStorage.getItem('lawyer_master_pro')) || { cases: [], reports: [] };
        let currentCategory = 'cases';
        let currentFilter = 'حالية';
        let editId = null;

        function saveItem() {
            const client = document.getElementById('commonClientName').value.trim();
            const role = document.getElementById('commonClientRole').value;
            if(!client || !role) return alert("يرجى إدخال اسم الموكل وصفته");

            const item = {
                id: editId || Date.now().toString(),
                category: currentCategory,
                status: currentFilter,
                clientName: client,
                clientRole: role,
                opponentName: document.getElementById('commonOpponentName').value,
                charge: document.getElementById('commonCharge').value,
                date: document.getElementById('commonDate').value,
                isAlarm: document.getElementById('isAlarmActive').value,
                alertDay: document.getElementById('alertDay').value,
                alertTime: document.getElementById('alertTime').value,
                caseNumber: document.getElementById('caseNumber').value,
                court: document.getElementById('court').value,
                circuit: document.getElementById('circuit').value,
                reportAridatNum: document.getElementById('reportAridatNum').value,
                reportType: document.getElementById('reportTypeInput').value,
                attachments: [] // تم الاحتفاظ بها لدعم الصور مستقبلاً
            };

            // ربط التقويم مع الأندرويد إذا كان المنبه مفعلاً
            if (item.isAlarm === 'true' && window.AndroidBridge) {
                try {
                    const startTime = new Date(`${item.alertDay}T${item.alertTime}:00`).getTime();
                    const endTime = startTime + (60 * 60 * 1000);
                    AndroidBridge.addEventToCalendar("موعد: " + item.clientName, item.court || "المكتب", startTime, endTime);
                } catch(e) { console.error("Calendar Error"); }
            }

            if(editId) {
                const idx = db[currentCategory].findIndex(i => i.id === editId);
                db[currentCategory][idx] = item;
            } else {
                db[currentCategory].unshift(item);
            }

            localStorage.setItem('lawyer_master_pro', JSON.stringify(db));
            if(window.AndroidBridge) AndroidBridge.showToast("✅ تم الحفظ بنجاح");
            toggleUI('list');
        }

        // الوظائف المساعدة (تم الإبقاء عليها كما هي لضمان عمل الواجهة)
        function switchCategory(cat) {
            currentCategory = cat;
            document.getElementById('cat-cases').className = cat === 'cases' ? "flex-1 py-3 rounded-xl text-xs font-black bg-amber-600 text-white shadow-lg" : "flex-1 py-3 rounded-xl text-xs font-black text-slate-500";
            document.getElementById('cat-reports').className = cat === 'reports' ? "flex-1 py-3 rounded-xl text-xs font-black bg-blue-600 text-white shadow-lg" : "flex-1 py-3 rounded-xl text-xs font-black text-slate-500";
            document.getElementById('case-fields').classList.toggle('hidden', cat !== 'cases');
            document.getElementById('report-fields').classList.toggle('hidden', cat !== 'reports');
            updateRoleButtons(); renderDisplay();
        }

        function updateRoleButtons() {
            const container = document.getElementById('role-container');
            const roles = currentCategory === 'cases' ? ['مدعي', 'مدعي عليه', 'متهم', 'مجني عليه'] : ['شاكي', 'مشكو في حقه', 'مبلغ'];
            container.innerHTML = roles.map(r => `<button onclick="setRole('${r}')" id="role-${r}" class="py-2.5 rounded-xl text-[10px] font-bold bg-slate-800 text-slate-400 border border-transparent">${r}</button>`).join('');
        }

        function setRole(role) {
            document.getElementById('commonClientRole').value = role;
            document.querySelectorAll('#role-container button').forEach(b => b.classList.remove('tab-button-active'));
            document.getElementById(`role-${role}`)?.classList.add('tab-button-active');
        }

        function toggleUI(view) {
            document.getElementById('list-section').classList.toggle('hidden', view === 'add');
            document.getElementById('search-area').classList.toggle('hidden', view === 'add');
            document.getElementById('add-section').classList.toggle('hidden', view !== 'add');
            const icon = document.getElementById('header-icon');
            icon.style.transform = view === 'add' ? "rotate(45deg)" : "rotate(0deg)";
            icon.style.color = view === 'add' ? "#ef4444" : "#f59e0b";
            if(view === 'list') { editId = null; renderDisplay(); } else { resetForm(); }
        }

        function resetForm() {
            const inputs = document.querySelectorAll('#add-section input, #add-section textarea');
            inputs.forEach(i => i.value = '');
            setRole('');
            if(document.getElementById('isAlarmActive').value === 'true') toggleAlarm();
        }

        function toggleAlarm() {
            const isActive = document.getElementById('isAlarmActive').value === 'true';
            document.getElementById('isAlarmActive').value = !isActive;
            const btn = document.getElementById('alarm-btn');
            const inputs = document.getElementById('alarm-inputs');
            btn.className = !isActive ? "bg-blue-600 px-4 py-2 rounded-full border border-blue-400 flex items-center gap-2" : "bg-slate-800 px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2";
            inputs.style.opacity = !isActive ? "1" : "0.3";
            inputs.style.pointerEvents = !isActive ? "auto" : "none";
            document.getElementById('alarm-text-btn').innerText = !isActive ? "مفعل" : "معطل";
            lucide.createIcons();
        }

        function renderDisplay() {
            const container = document.getElementById('cards-container');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const data = db[currentCategory].filter(i => i.status === currentFilter && (i.clientName.toLowerCase().includes(search) || (i.caseNumber && i.caseNumber.includes(search))));
            document.getElementById('items-count').innerText = `${data.length} سجل`;
            
            container.innerHTML = data.map(i => `
                <div class="relative bg-slate-900 border border-slate-700/50 rounded-2xl p-5 shadow-xl mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="bg-slate-800 text-amber-500 px-3 py-1 rounded-full text-[10px] font-black">${i.clientRole}</span>
                        <div class="flex gap-2">
                            <button onclick="editItem('${i.id}')" class="text-blue-400 p-1"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('${i.id}')" class="text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <h3 class="text-lg font-black text-white">${i.clientName}</h3>
                    <p class="text-xs text-slate-400 mt-1">${i.charge || 'بدون موضوع'}</p>
                    <div class="mt-4 flex items-center gap-2 text-amber-500 font-bold text-sm">
                        <i data-lucide="calendar" class="w-4 h-4"></i> ${i.date || 'بدون موعد'}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function editItem(id) {
            const item = db[currentCategory].find(i => i.id === id);
            if(!item) return;
            editId = id;
            toggleUI('add');
            document.getElementById('commonClientName').value = item.clientName;
            setRole(item.clientRole);
            document.getElementById('commonCharge').value = item.charge;
            document.getElementById('commonDate').value = item.date;
            document.getElementById('caseNumber').value = item.caseNumber || '';
            if(item.isAlarm === 'true') toggleAlarm();
        }

        function deleteItem(id) {
            if(confirm("هل تريد حذف هذا السجل؟")) {
                db[currentCategory] = db[currentCategory].filter(i => i.id !== id);
                localStorage.setItem('lawyer_master_pro', JSON.stringify(db));
                renderDisplay();
            }
        }

        function handleHeaderButtonClick() {
            const addSec = document.getElementById('add-section');
            toggleUI(addSec.classList.contains('hidden') ? 'add' : 'list');
        }

        window.onload = () => {
            updateRoleButtons();
            renderDisplay();
            lucide.createIcons();
        };
    </script>
</body>
</html>
