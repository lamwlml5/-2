<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
      if('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المستشار أحمد والي - نظام الإدارة القانونية الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .input-box { background-color: #1e293b; border: 1px solid #334155; transition: all 0.2s ease; }
        .input-box:focus-within { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1); }
        .tab-button-active { background-color: #f59e0b; color: white; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); border-color: #f59e0b !important; }
        .nav-active { color: #f59e0b; }
        .animate-ring { animation: ring 2s infinite ease-in-out; }
        @keyframes ring { 0% { transform: rotate(0); } 10% { transform: rotate(15deg); } 20% { transform: rotate(-15deg); } 30% { transform: rotate(10deg); } 40% { transform: rotate(-10deg); } 50% { transform: rotate(0); } 100% { transform: rotate(0); } }
        input, select, textarea { appearance: none; color-scheme: dark; }
        .case-card { background-color: #1e293b; border-radius: 2rem; padding: 1.5rem; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; transition: all 0.2s ease; }
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-page { padding: 1.5cm; page-break-after: always; direction: rtl; font-family: 'Cairo', sans-serif; color: black !important; }
            .print-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 30px; }
            .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
            .print-item { border-bottom: 1px solid #ddd; padding: 10px 5px; display: flex; gap: 10px; }
            .print-label { font-weight: 900; min-width: 120px; }
            .image-page { display: flex; justify-content: center; align-items: center; height: 100vh; page-break-before: always; }
            .image-page img { max-width: 100%; max-height: 95%; object-fit: contain; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="pb-28">

    <!-- نظام التنبيه الفوري -->
    <div id="alarm-banner" class="fixed top-4 left-4 right-4 z-[300] bg-gradient-to-r from-red-600 to-amber-600 text-white p-5 rounded-3xl shadow-2xl hidden flex items-center gap-4 border border-white/20 animate-bounce no-print">
        <div class="bg-white/20 p-3 rounded-2xl animate-ring">
            <i data-lucide="bell-ring" class="w-7 h-7"></i>
        </div>
        <div class="flex-1">
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">تذكير قانوني هام</p>
            <p id="alarm-text" class="text-sm font-black leading-tight"></p>
        </div>
        <button onclick="dismissAlarm()" class="bg-black/20 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>

    <!-- Header -->
    <header class="p-6 flex items-center justify-between sticky top-0 bg-[#020617]/80 backdrop-blur-lg z-[50] border-b border-slate-800 no-print">
        <div class="flex items-center gap-3">
            <div class="bg-amber-600 p-2.5 rounded-2xl shadow-lg shadow-amber-900/40">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight">المستشار أحمد والي</h1>
                <p class="text-[9px] text-amber-500 font-bold uppercase tracking-wider">نظام الإدارة القانونية الذكي</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="exportDatabase()" title="تصدير نسخة احتياطية" class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl active:scale-90 transition-transform">
                <i data-lucide="download" class="w-5 h-5 text-emerald-500"></i>
            </button>
            <label class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-xl cursor-pointer">
                <i data-lucide="upload" class="w-5 h-5 text-blue-500"></i>
                <input type="file" class="hidden" accept=".json" onchange="importDatabase(event)">
            </label>
            <button onclick="handleHeaderButtonClick()" class="bg-[#1e293b] p-3 rounded-2xl border border-slate-700 shadow-xl">
                <i data-lucide="plus" id="header-icon" class="w-6 h-6 text-amber-500 transition-all"></i>
            </button>
        </div>
    </header>

    <main class="px-5 mt-6 no-print">
        <!-- التصنيفات -->
        <div class="flex gap-2 mb-6 bg-slate-900/50 p-1 rounded-2xl border border-slate-800">
            <button onclick="switchCategory('cases')" id="cat-cases" class="flex-1 py-3 rounded-xl text-xs font-black transition-all bg-amber-600 text-white shadow-lg">القضايا</button>
            <button onclick="switchCategory('reports')" id="cat-reports" class="flex-1 py-3 rounded-xl text-xs font-black transition-all text-slate-500">المحاضر</button>
        </div>

        <!-- البحث -->
        <div id="search-area" class="mb-6">
            <div class="relative">
                <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                <input type="text" id="searchInput" oninput="renderDisplay()" placeholder="ابحث في السجلات..." class="w-full bg-[#1e293b] border border-slate-800 rounded-2xl py-4 pr-12 pl-4 outline-none text-sm font-bold text-center">
            </div>
        </div>

        <!-- القائمة -->
        <div id="list-section">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 id="current-view-title" class="text-xs font-black text-slate-500 uppercase tracking-widest">السجلات الحالية</h2>
                <span id="items-count" class="bg-slate-800 text-amber-500 px-3 py-1 rounded-full text-[10px] font-bold">0 سجل</span>
            </div>
            <div id="cards-container" class="space-y-4"></div>
        </div>

        <!-- النموذج (Form) -->
        <div id="add-section" class="hidden pb-10 space-y-6">
            <!-- حقول القضايا -->
            <div id="case-fields" class="space-y-4">
                <h2 class="text-amber-500 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="gavel" class="w-4 h-4"></i> بيانات الدعوى</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم القضية</label><input type="text" id="caseNumber" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم الحصر</label><input type="text" id="hasrNumber" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                </div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم الاستئناف</label><input type="text" id="appealNumber" class="w-full bg-transparent outline-none text-sm font-bold text-center text-blue-400"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">المحكمة</label><input type="text" id="court" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">الدائرة</label><input type="text" id="circuit" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                </div>
            </div>

            <!-- حقول المحاضر -->
            <div id="report-fields" class="hidden space-y-4">
                <h2 class="text-blue-500 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="file-text" class="w-4 h-4"></i> بيانات المحضر</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">رقم العريضة</label><input type="text" id="reportAridatNum" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">تاريخها</label><input type="date" id="reportAridatDate" class="w-full bg-transparent outline-none text-xs font-bold text-center"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">نوع المحضر</label><input type="text" id="reportTypeInput" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                    <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">الرقم القضائي</label><input type="text" id="reportLegalNum" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                </div>
                <div class="input-box rounded-2xl p-3">
                    <label class="block text-[9px] text-slate-500 mb-1">قرار النيابة</label>
                    <select id="reportNiyabaDecision" class="w-full bg-transparent outline-none text-xs font-bold text-center text-amber-500">
                        <option value="قيد العرض">قيد العرض</option>
                        <option value="تم الحفظ">تم الحفظ</option>
                        <option value="إحالة للمحكمة">إحالة للمحكمة</option>
                        <option value="استيفاء">استيفاء</option>
                    </select>
                </div>
            </div>

            <!-- الحقول المشتركة -->
            <div class="space-y-4">
                <h2 class="text-slate-400 text-xs font-black flex items-center gap-2 mb-2"><i data-lucide="users" class="w-4 h-4"></i> بيانات الأطراف</h2>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">اسم الموكل</label><input type="text" id="commonClientName" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div id="role-container" class="grid grid-cols-2 gap-2"></div>
                <input type="hidden" id="commonClientRole" value="">
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">اسم الخصم</label><input type="text" id="commonOpponentName" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">التهمة / موضوع السجل</label><input type="text" id="commonCharge" class="w-full bg-transparent outline-none text-sm font-bold text-center"></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">الموضوع (تفصيلي)</label><textarea id="commonSubject" rows="3" class="w-full bg-transparent outline-none text-sm"></textarea></div>
                <div class="input-box rounded-2xl p-3"><label class="block text-[9px] text-slate-500 mb-1">موعد الجلسة القادمة</label><input type="date" id="commonDate" class="w-full bg-transparent outline-none text-xs font-bold text-center text-amber-500"></div>
            </div>

            <!-- المرفقات -->
            <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5 space-y-4">
                <h2 class="text-xs font-black text-slate-400 flex items-center gap-2"><i data-lucide="image" class="w-4 h-4"></i> إرفاق صور</h2>
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer">
                    <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-500 mb-2"></i>
                    <input type="file" id="fileUpload" class="hidden" multiple accept="image/*" onchange="handleFileSelect(event)">
                </label>
                <div id="file-preview-container" class="grid grid-cols-4 gap-2"></div>
            </div>

            <!-- التنبيهات -->
            <div class="bg-blue-600/5 border border-blue-500/20 rounded-[2rem] p-5 space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2"><div id="alarm-indicator" class="w-2 h-2 rounded-full bg-slate-600"></div><span class="text-[11px] font-black text-blue-400">ضبط منبه تلقائي</span></div>
                    <button type="button" onclick="toggleAlarm()" id="alarm-btn" class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2">
                        <i data-lucide="bell-off" id="alarm-icon" class="w-4 h-4 text-slate-500"></i>
                        <span id="alarm-text-btn" class="text-[10px] font-bold text-slate-500">معطل</span>
                    </button>
                </div>
                <div id="alarm-inputs" class="grid grid-cols-2 gap-3 opacity-30 pointer-events-none">
                    <div class="input-box rounded-xl p-3"><label class="block text-[8px] text-slate-500 mb-1">يوم التنبيه</label><input type="date" id="alertDay" class="w-full bg-transparent outline-none text-[10px] text-center"></div>
                    <div class="input-box rounded-xl p-3"><label class="block text-[8px] text-slate-500 mb-1">ساعة التنبيه</label><input type="time" id="alertTime" class="w-full bg-transparent outline-none text-[10px] text-center"></div>
                </div>
                <input type="hidden" id="isAlarmActive" value="false">
            </div>

            <button onclick="saveItem()" class="w-full bg-gradient-to-r from-amber-600 to-amber-700 text-white font-black py-5 rounded-[2rem] shadow-2xl flex items-center justify-center gap-3 text-lg">
                <i data-lucide="save"></i> حفظ البيانات بالكامل
            </button>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-6 left-6 right-6 z-[100] bg-[#1e293b]/80 backdrop-blur-xl border border-slate-700/50 h-20 rounded-[2.5rem] flex items-center justify-around no-print">
        <button onclick="setFilter('حالية')" id="nav-حالية" class="flex flex-col items-center gap-1 nav-active transition-all"><i data-lucide="briefcase" class="w-6 h-6"></i><span class="text-[9px] font-bold">الحالية</span></button>
        <button onclick="setFilter('مداولة')" id="nav-مداولة" class="flex flex-col items-center gap-1 text-slate-500 transition-all"><i data-lucide="refresh-cw" class="w-6 h-6"></i><span class="text-[9px] font-bold">مداولة</span></button>
        <button onclick="setFilter('منتهية')" id="nav-منتهية" class="flex flex-col items-center gap-1 text-slate-500 transition-all"><i data-lucide="check-circle-2" class="w-6 h-6"></i><span class="text-[9px] font-bold">المنتهية</span></button>
    </nav>

    <div id="print-container" class="print-only"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('lawyer_master_pro')) || { cases: [], reports: [] };
        let currentCategory = 'cases';
        let currentFilter = 'حالية';
        let editId = null;
        let tempFiles = [];

        async function exportToPDF(id) {
            const item = db[currentCategory].find(i => i.id === id);
            if (!item) return;
            const btn = event.currentTarget;
            btn.innerHTML = "⏳";
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const tempDiv = document.createElement('div');
                tempDiv.style.width = '800px';
                tempDiv.style.padding = '40px';
                tempDiv.style.background = '#fff';
                tempDiv.setAttribute('dir', 'rtl');
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '-9999px';
                const isCase = item.category === 'cases';
                tempDiv.innerHTML = `
                    <div style="border: 4px double #c5a059; padding: 30px; border-radius: 15px; font-family: Arial;">
                        <div style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px;">
                            <h1 style="color: #c5a059; margin: 0; font-size: 28px;">المستشار أحمد والي</h1>
                            <p style="margin: 5px 0; font-weight: bold;">نظام الإدارة القانونية الذكي</p>
                        </div>
                        <h2 style="text-align: center; background: #f8f9fa; padding: 10px; margin-top:20px;">${isCase ? 'تقرير ملف قضية' : 'تقرير ملف محضر'}</h2>
                        <table style="width: 100%; margin-top: 20px; font-size: 18px; border-collapse: collapse;">
                            <tr><td style="padding: 10px; border-bottom: 1px solid #eee;"><b>الموكل:</b></td><td style="padding: 10px; border-bottom: 1px solid #eee; text-align:left;">${item.clientName}</td></tr>
                            <tr><td style="padding: 10px; border-bottom: 1px solid #eee;"><b>الصفة:</b></td><td style="padding: 10px; border-bottom: 1px solid #eee; text-align:left;">${item.clientRole}</td></tr>
                            <tr><td style="padding: 10px; border-bottom: 1px solid #eee;"><b>الخصم:</b></td><td style="padding: 10px; border-bottom: 1px solid #eee; text-align:left;">${item.opponentName || '---'}</td></tr>
                            <tr><td style="padding: 10px; border-bottom: 1px solid #eee;"><b>${isCase ? 'رقم القضية:' : 'رقم العريضة:'}</b></td><td style="padding: 10px; border-bottom: 1px solid #eee; text-align:left; color:#c5a059;">${isCase ? item.caseNumber : item.reportAridatNum}</td></tr>
                            <tr><td style="padding: 10px; border-bottom: 1px solid #eee;"><b>التاريخ:</b></td><td style="padding: 10px; border-bottom: 1px solid #eee; text-align:left;">${item.date || '---'}</td></tr>
                        </table>
                        <div style="margin-top: 30px; padding: 15px; background: #fffcf5; border-right: 5px solid #c5a059;">
                            <h3>الموضوع:</h3><p>${item.charge || item.subject || 'لا يوجد'}</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(tempDiv);
                const canvas = await html2canvas(tempDiv, { scale: 2 });
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                doc.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                if (item.attachments && item.attachments.length > 0) {
                    for (const fileData of item.attachments) { doc.addPage(); doc.addImage(fileData, 'JPEG', 10, 10, 190, 277); }
                }
                doc.save(`تقرير_${item.clientName}.pdf`);
                document.body.removeChild(tempDiv);
            } catch (error) { console.error(error); alert("خطأ في التصدير"); } finally { btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i>'; lucide.createIcons(); }
        }

        function saveItem() {
            const client = document.getElementById('commonClientName').value.trim();
            const role = document.getElementById('commonClientRole').value;
            if(!client || !role) return alert("يرجى إدخال اسم الموكل وصفته");

            const item = {
                id: editId || Date.now().toString(),
                category: currentCategory,
                status: currentFilter,
                clientName: client,
                clientRole: role,
                opponentName: document.getElementById('commonOpponentName').value,
                charge: document.getElementById('commonCharge').value,
                subject: document.getElementById('commonSubject').value,
                date: document.getElementById('commonDate').value,
                isAlarm: document.getElementById('isAlarmActive').value,
                alertDay: document.getElementById('alertDay').value,
                alertTime: document.getElementById('alertTime').value,
                caseNumber: document.getElementById('caseNumber').value,
                hasrNumber: document.getElementById('hasrNumber').value,
                appealNumber: document.getElementById('appealNumber').value,
                court: document.getElementById('court').value,
                circuit: document.getElementById('circuit').value,
                reportAridatNum: document.getElementById('reportAridatNum').value,
                reportAridatDate: document.getElementById('reportAridatDate').value,
                reportType: document.getElementById('reportTypeInput').value,
                reportLegalNum: document.getElementById('reportLegalNum').value,
                niyabaDecision: document.getElementById('reportNiyabaDecision').value,
                attachments: [...tempFiles]
            };

            // الربط مع الأندرويد (التقويم)
            if (item.isAlarm === 'true' && window.AndroidBridge) {
                const startTime = new Date(`${item.alertDay}T${item.alertTime}:00`).getTime();
                const endTime = startTime + (60 * 60 * 1000);
                AndroidBridge.addEventToCalendar("جلسة: " + item.clientName, item.court || "المحكمة", startTime, endTime);
            }

            if(editId) {
                const idx = db[currentCategory].findIndex(i => i.id === editId);
                db[currentCategory][idx] = item;
            } else {
                db[currentCategory].unshift(item);
            }

            localStorage.setItem('lawyer_master_pro', JSON.stringify(db));
            if(window.AndroidBridge) AndroidBridge.showToast("تم الحفظ بنجاح");
            toggleUI('list');
        }

        function renderDisplay() {
            const container = document.getElementById('cards-container');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const data = db[currentCategory].filter(i => i.status === currentFilter && (i.clientName.toLowerCase().includes(search) || (i.caseNumber && i.caseNumber.includes(search)) || (i.reportAridatNum && i.reportAridatNum.includes(search)))).sort((a,b) => new Date(a.date) - new Date(b.date));
            document.getElementById('items-count').innerText = `${data.length} سجل`;
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = data.map(i => {
                const isToday = i.date === today;
                return `
                <div class="relative bg-slate-900 border ${isToday ? 'border-red-500' : 'border-slate-700/50'} rounded-2xl p-5 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-slate-800 text-amber-500 px-3 py-1 rounded-full text-[10px] font-black">${i.clientRole}</span>
                        <div class="flex gap-1">
                            <button onclick="editItem('${i.id}')" class="p-2 text-blue-400"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); exportToPDF('${i.id}')" class="p-2 text-emerald-400"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('${i.id}')" class="p-2 text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <h3 class="text-lg font-black text-white">${i.clientName}</h3>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-[11px] text-slate-400">
                        <div>الخصم: ${i.opponentName || '---'}</div>
                        <div>رقم: ${i.category === 'cases' ? i.caseNumber : i.reportAridatNum}</div>
                    </div>
                    <div class="mt-4 py-2 text-center rounded-xl bg-slate-800/40 text-amber-500 font-bold text-sm">
                        <i data-lucide="calendar" class="inline w-4 h-4 ml-1"></i> ${isToday ? 'اليـــوم' : (i.date || 'بدون موعد')}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // الوظائف المساعدة
        function switchCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat-cases').className = cat === 'cases' ? "flex-1 py-3 rounded-xl text-xs font-black bg-amber-600 text-white shadow-lg" : "flex-1 py-3 text-slate-500";
            document.getElementById('cat-reports').className = cat === 'reports' ? "flex-1 py-3 rounded-xl text-xs font-black bg-blue-600 text-white shadow-lg" : "flex-1 py-3 text-slate-500";
            document.getElementById('case-fields').classList.toggle('hidden', cat !== 'cases');
            document.getElementById('report-fields').classList.toggle('hidden', cat !== 'reports');
            updateRoleButtons(); renderDisplay(); 
        }
        function updateRoleButtons() {
            const roles = currentCategory === 'cases' ? ['مدعي', 'مدعي عليه', 'متهم', 'مجني عليه'] : ['شاكي', 'مشكو في حقه', 'مجني عليه', 'مبلغ'];
            document.getElementById('role-container').innerHTML = roles.map(r => `<button onclick="setRole('${r}')" id="role-${r}" class="py-2.5 rounded-xl text-[10px] font-bold bg-slate-800 text-slate-400 border border-transparent">${r}</button>`).join('');
        }
        function setRole(role) { document.getElementById('commonClientRole').value = role; document.querySelectorAll('#role-container button').forEach(b => b.classList.remove('tab-button-active')); document.getElementById(`role-${role}`)?.classList.add('tab-button-active'); }
        function handleFileSelect(event) { Array.from(event.target.files).forEach(file => { const r = new FileReader(); r.onload = (e) => { tempFiles.push(e.target.result); updateFilePreview(); }; r.readAsDataURL(file); }); }
        function updateFilePreview() { document.getElementById('file-preview-container').innerHTML = tempFiles.map((f, i) => `<div class="relative h-16 rounded-lg overflow-hidden border border-slate-600"><img src="${f}" class="w-full h-full object-cover"><button onclick="tempFiles.splice(${i},1);updateFilePreview()" class="absolute top-0 right-0 bg-red-600 text-white p-0.5"><i data-lucide="x" class="w-3 h-3"></i></button></div>`).join(''); lucide.createIcons(); }
        function toggleUI(view) { document.getElementById('list-section').classList.toggle('hidden', view === 'add'); document.getElementById('search-area').classList.toggle('hidden', view === 'add'); document.getElementById('add-section').classList.toggle('hidden', view !== 'add'); const icon = document.getElementById('header-icon'); icon.style.transform = view === 'add' ? "rotate(45deg)" : "rotate(0deg)"; icon.classList.toggle('text-red-500', view === 'add'); if(view==='list') editId=null; else resetForm(); lucide.createIcons(); }
        function resetForm() { document.querySelectorAll('#add-section input, #add-section textarea').forEach(i => i.value=''); tempFiles=[]; updateFilePreview(); updateRoleButtons(); }
        function toggleAlarm() { const act = document.getElementById('isAlarmActive').value === 'true'; document.getElementById('isAlarmActive').value = !act; document.getElementById('alarm-btn').classList.toggle('bg-blue-600', !act); document.getElementById('alarm-inputs').style.opacity = !act ? "1" : "0.3"; document.getElementById('alarm-inputs').style.pointerEvents = !act ? "auto" : "none"; document.getElementById('alarm-text-btn').innerText = !act ? "مفعل" : "معطل"; lucide.createIcons(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active')); document.getElementById(`nav-${f}`).classList.add('nav-active'); renderDisplay(); }
        function editItem(id) {
            const item = db[currentCategory].find(i => i.id === id); if(!item) return; editId = id; toggleUI('add');
            document.getElementById('commonClientName').value = item.clientName; setRole(item.clientRole);
            document.getElementById('commonOpponentName').value = item.opponentName; document.getElementById('commonCharge').value = item.charge;
            document.getElementById('commonSubject').value = item.subject; document.getElementById('commonDate').value = item.date;
            document.getElementById('caseNumber').value = item.caseNumber || ''; document.getElementById('hasrNumber').value = item.hasrNumber || '';
            document.getElementById('appealNumber').value = item.appealNumber || ''; document.getElementById('court').value = item.court || '';
            document.getElementById('circuit').value = item.circuit || ''; document.getElementById('reportAridatNum').value = item.reportAridatNum || '';
            document.getElementById('reportAridatDate').value = item.reportAridatDate || ''; document.getElementById('reportTypeInput').value = item.reportType || '';
            document.getElementById('reportLegalNum').value = item.reportLegalNum || ''; document.getElementById('reportNiyabaDecision').value = item.niyabaDecision || 'قيد العرض';
            tempFiles = item.attachments || []; updateFilePreview(); if(item.isAlarm === 'true') toggleAlarm();
        }
        function deleteItem(id) { if(confirm("حذف؟")) { db[currentCategory] = db[currentCategory].filter(i => i.id !== id); localStorage.setItem('lawyer_master_pro', JSON.stringify(db)); renderDisplay(); } }
        function handleHeaderButtonClick() { toggleUI(document.getElementById('add-section').classList.contains('hidden') ? 'add' : 'list'); }
        function exportDatabase() { if(window.AndroidBridge) AndroidBridge.backupToDrive(JSON.stringify(db)); else { const b=new Blob([JSON.stringify(db)],{type:"application/json"}); const u=URL.createObjectURL(b); const l=document.createElement('a'); l.href=u; l.download="backup.json"; l.click(); } }
        function importDatabase(e) { const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=(ev)=>{ db=JSON.parse(ev.target.result); localStorage.setItem('lawyer_master_pro', JSON.stringify(db)); renderDisplay(); }; r.readAsText(f); } }
        window.updateFromDrive = function(json) { db=JSON.parse(json); localStorage.setItem('lawyer_master_pro', JSON.stringify(db)); renderDisplay(); if(window.AndroidBridge) AndroidBridge.showToast("تم المزامنة"); }

        window.onload = () => { updateRoleButtons(); renderDisplay(); lucide.createIcons(); if(db.cases.length === 0 && window.AndroidBridge) AndroidBridge.restoreFromDrive(); };
    </script>
</body>
</html>
